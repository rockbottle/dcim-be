name: Build and Push DCIM Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "auth/**"
      - "db/**"
      - "router/**"
      - "*.py"
      - "requirements*.txt"
      - "Dockerfile"
      - ".github/workflows/docker-build.yml"

permissions:
  contents: read
  packages: read
  security-events: write # Required for secret scanning results

jobs:
  validate-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history needed for some scanners

      # 1. SECRET SCANNING
      - name: Secret Scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. PYTHON LINTING (Flake8)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Linting Tools
        run: |
          pip install flake8

      - name: Run Lint Check
        run: |
          # stop the build if there are Python syntax errors or undefined names
          flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
          # exit-zero treats all errors as warnings (you can change this to 1 to fail the build on style issues)
          flake8 . --count --exit-zero --max-complexity=10 --max-line-length=127 --statistics

      # 3. DOCKER PREPARATION
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOKERHUB_TOKEN }}

      # 4. BUILD & PUSH
      # This will trigger the 'tester' stage in your Dockerfile automatically.
      # If 'pytest' fails inside the Docker build, this step fails and nothing is pushed.
      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            pramoneo/dcim-be:latest
            pramoneo/dcim-be:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
