name: Build and Push DCIM Backend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "auth/**"
      - "db/**"
      - "router/**"
      - "*.py"
      - "requirements*.txt"
      - "Dockerfile"

jobs:
  validate-test-deploy:
    runs-on: ubuntu-latest

    services:
      # Database service for E2E tests
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password
          POSTGRES_DB: dcim_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. SECRET SCANNING
      - name: Secret Scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 2. PREPARE TEST ENVIRONMENT
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      # 3. UNIT TESTS (Fast, no DB needed)
      - name: Run Unit Tests
        env:
          # We use an ENV var fallback here since your code supports it!
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
          DATABASE_URL: sqlite:///./test.db
        run: pytest tests/ # Assuming you separate unit tests

      # 4. E2E TESTS (Needs DB and Secret handling)
      - name: Run E2E Tests
        env:
          DATABASE_URL: postgresql+asyncpg://test_user:test_password@localhost:5432/dcim_test
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          # Create the secret directory and file to test the /run/secrets logic
          sudo mkdir -p /run/secrets
          echo "${{ secrets.JWT_SECRET_KEY }}" | sudo tee /run/secrets/JWT_SECRET_KEY

          # Run the E2E flow
          pytest tests/test_e2e_dcim_flow.py -v

      # 5. DOCKER BUILD & PUSH
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          # We don't need to run tests inside build anymore because they passed above
          push: true
          tags: |
            pramoneo/dcim-be:latest
            pramoneo/dcim-be:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
